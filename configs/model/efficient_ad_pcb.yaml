model:
  class_path: anomalib.models.EfficientAd
  init_args:
    teacher_out_channels: 384
    model_size: S
    lr: 0.0001
    weight_decay: 1.0e-05
    padding: false
    pad_maps: true

trainer:
  max_epochs: 100
  max_steps: 10000
  accelerator: auto
  devices: 1
  precision: 32
  enable_checkpointing: true
  enable_progress_bar: true
  log_every_n_steps: 10
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: image_AUROC
        mode: max
        save_top_k: 1
        filename: "best_model"
        auto_insert_metric_name: false
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: image_AUROC
        patience: 10
        mode: max

logging:
  log_graph: false

seed_everything: 42

